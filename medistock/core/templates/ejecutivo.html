<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Ejecutivo - MEDISTOCK</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">MEDISTOCK - Ejecutivo</a>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Gestión de Pedidos</h1>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID Pedido</th>
                        <th>Fecha</th>
                    </tr>
                </thead>

                <tbody>
                    {% for pedido in pedidos %}
                    <tr>
                        <td>#{{ pedido.id }}</td>
                        <td>{{ pedido.fecha }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2">No hay pedidos registrados</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
